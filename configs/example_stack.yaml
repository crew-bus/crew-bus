# crew-bus Example Configuration
# Generic starting point — copy this file and customize for your setup.
#
# To customize: cp configs/example_stack.yaml configs/my_stack.yaml
# Then edit my_stack.yaml with your own preferences.
#
# FREE AND OPEN SOURCE — crew-bus is free infrastructure for the world.
# Guardian Activation available separately ($29 one-time, unlocks Skill Store).

organization:
  name: "My Crew"

hierarchy:
  human:
    name: Human
    channel: console
    timezone: UTC
    quiet_hours:
      start: "22:00"
      end: "07:00"
    personality:
      type: hybrid
      work_style: balanced
      social_recharge: mixed
    communication:
      preferred_channel: console
      message_length: concise
      formality: casual

  # Your three core agents — Boss talks, Guard protects, Vault remembers.
  crew_boss:
    name: Crew Boss
    agent_type: right_hand
    channel: console
    reports_to: Human
    trust_score: 5
    description: "Your AI right-hand. Handles 80% of everything."

  guardian:
    name: Guardian
    agent_type: security
    channel: console
    reports_to: Crew Boss
    active: true
    description: "Always-on protector, setup guide, and Skill Store manager."

  vault:
    name: Vault
    agent_type: vault
    channel: console
    reports_to: Crew Boss
    active: true
    description: "Private memory — journals, life data, personal notes."

  # Teams — add your own below. Example:
