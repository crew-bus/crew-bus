name: CrewBus
options:
  bundleIdPrefix: com.crewbus
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

packages:
  CrewBusKit:
    path: ../CrewBusKit
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  CrewBus:
    type: application
    platform: macOS
    sources:
      - CrewBus/Sources
    resources:
      - CrewBus/Resources
    dependencies:
      - package: CrewBusKit
      - package: Sparkle
    info:
      path: CrewBus/Resources/Info.plist
      properties:
        CFBundleDisplayName: Crew Bus
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSApplicationCategoryType: public.app-category.utilities
        NSHighResolutionCapable: true
        NSApplicationSupportsSecureRestorableState: true
        SUFeedURL: "https://crew-bus.dev/appcast.xml"
        SUPublicEDKey: "zN6Wqmd98zMybysEFqK8w7Wf6Gpcdemh7wb0xVfIh8Y="
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.crewbus.mac
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      SWIFT_VERSION: "5.9"
      DEVELOPMENT_TEAM: "KGG7W48LZG"
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "Developer ID Application"
      ENABLE_HARDENED_RUNTIME: true
      OTHER_CODE_SIGN_FLAGS: "--timestamp"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: CrewBus/Resources/CrewBus.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.files.user-selected.read-write: true
