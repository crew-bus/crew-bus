<svg xmlns="http://www.w3.org/2000/svg" width="720" height="440" viewBox="0 0 720 440">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0e16"/>
      <stop offset="50%" style="stop-color:#12122a"/>
      <stop offset="100%" style="stop-color:#0c0e16"/>
    </linearGradient>
    <!-- Play button glow -->
    <radialGradient id="playGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Gold glow for Guardian -->
    <filter id="glowGold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Purple glow for Vault -->
    <filter id="glowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Boss white glow -->
    <filter id="glowWhite" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Play button drop shadow -->
    <filter id="playShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Bottom overlay gradient -->
    <linearGradient id="bottomFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(12,14,22,0)"/>
      <stop offset="60%" style="stop-color:rgba(12,14,22,0.7)"/>
      <stop offset="100%" style="stop-color:rgba(12,14,22,0.95)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="440" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="718" height="438" rx="15" fill="none" stroke="rgba(45,55,72,0.6)" stroke-width="1"/>

  <!-- Subtle grid pattern for depth -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="720" y2="440" stroke="#fff" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="0" y2="440" stroke="#fff" stroke-width="0.5"/>
    <circle cx="360" cy="170" r="140" fill="none" stroke="#fff" stroke-width="0.5"/>
    <circle cx="360" cy="170" r="90" fill="none" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Connection lines from boss to agents (triangle) -->
  <g opacity="0.15">
    <line x1="360" y1="100" x2="260" y2="280" stroke="#d18616" stroke-width="1.5"/>
    <line x1="360" y1="100" x2="460" y2="280" stroke="#9c6bdb" stroke-width="1.5"/>
  </g>

  <!-- ===== AGENT BUBBLES ===== -->

  <!-- Guardian (bottom-left) — gold -->
  <g>
    <circle cx="260" cy="280" r="38" fill="rgba(12,14,22,0.92)" stroke="#d18616" stroke-width="2"/>
    <circle cx="260" cy="280" r="38" fill="none" stroke="#d18616" stroke-width="1" opacity="0.3" filter="url(#glowGold)"/>
    <text x="260" y="274" text-anchor="middle" fill="#fff" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="18">&#128737;</text>
    <text x="260" y="292" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="7" font-weight="700" letter-spacing="0.8" text-transform="uppercase">GUARDIAN</text>
  </g>

  <!-- Vault (bottom-right) — purple -->
  <g>
    <circle cx="460" cy="280" r="38" fill="rgba(12,14,22,0.92)" stroke="#9c6bdb" stroke-width="2"/>
    <circle cx="460" cy="280" r="38" fill="none" stroke="#9c6bdb" stroke-width="1" opacity="0.3" filter="url(#glowPurple)"/>
    <text x="460" y="274" text-anchor="middle" fill="#fff" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="18">&#128302;</text>
    <text x="460" y="292" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="7" font-weight="700" letter-spacing="0.8" text-transform="uppercase">VAULT</text>
  </g>

  <!-- ===== CREW BOSS — top of triangle ===== -->
  <g>
    <!-- Outer glow ring -->
    <circle cx="360" cy="100" r="58" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="20"/>
    <!-- Boss circle -->
    <circle cx="360" cy="100" r="50" fill="rgba(12,14,22,0.95)" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" filter="url(#glowWhite)"/>
    <text x="360" y="94" text-anchor="middle" fill="#fff" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="22">&#10025;</text>
    <text x="360" y="112" text-anchor="middle" fill="#fff" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="9" font-weight="700" letter-spacing="1.5" text-transform="uppercase">CREW BOSS</text>
  </g>

  <!-- ===== PLAY BUTTON OVERLAY ===== -->
  <g>
    <!-- Large soft glow behind play button -->
    <circle cx="360" cy="190" r="80" fill="url(#playGlow)" opacity="0.6"/>
    <!-- Play button background -->
    <circle cx="360" cy="190" r="32" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" filter="url(#playShadow)"/>
    <!-- Play triangle -->
    <polygon points="352,175 352,205 376,190" fill="rgba(255,255,255,0.95)"/>
  </g>

  <!-- ===== BOTTOM TEXT OVERLAY ===== -->
  <rect x="0" y="340" width="720" height="100" rx="0" fill="url(#bottomFade)"/>
  <!-- Bottom rounded corners mask -->
  <rect x="0" y="424" width="720" height="16" rx="16" fill="rgba(12,14,22,0.95)"/>

  <text x="360" y="395" text-anchor="middle" fill="rgba(255,255,255,0.95)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="16" font-weight="700" letter-spacing="0.5">15-second demo</text>
  <text x="360" y="418" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="400">Watch your crew come to life</text>

  <!-- Outer frame border (on top of everything) -->
  <rect x="0.5" y="0.5" width="719" height="439" rx="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
</svg>
